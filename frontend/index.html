
<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X2 ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Cairo', sans-serif;
        background-color: #f8fafc;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      .dark body {
        background-color: #020617;
      }
      /* Custom scrollbar for a cleaner look */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      .dark ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      ::-webkit-scrollbar-thumb {
        background: #C1DBFD;
        border-radius: 10px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #334155;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #81A4CD;
      }
      /* Improve input focus visibility */
      input:focus, select:focus {
        border-color: #81A4CD !important;
        box-shadow: 0 0 0 3px rgba(129, 164, 205, 0.2) !important;
      }
      
      /* Prevent scroll chaining in modals and dropdowns */
      .fixed .overflow-y-auto, .fixed.overflow-y-auto {
        overscroll-behavior: contain;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#C1DBFD',
              secondary: '#F3D0D0',
              accent: '#6366f1',
              'accent-light': '#818cf8',
              'accent-dark': '#4f46e5',
            },
            boxShadow: {
              'soft': '0 2px 15px -3px rgba(0, 0, 0, 0.07), 0 10px 20px -2px rgba(0, 0, 0, 0.04)',
              'glow': '0 0 20px rgba(99, 102, 241, 0.3)',
            },
            animation: {
              'pulse-slow': 'pulse-slow 3s ease-in-out infinite',
              'float': 'float 3s ease-in-out infinite',
              'glow': 'glow 2s ease-in-out infinite',
              'fade-in-up': 'fadeInUp 0.4s ease-out',
            }
          }
        }
      }
    </script>

  }
}
</script>
